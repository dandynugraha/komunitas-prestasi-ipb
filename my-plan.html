<script src="https://cdn.tailwindcss.com"></script>
<body class="p-10 bg-[#F8FAFC]">
    <div class="grid grid-cols-3 gap-8">
        <div class="col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm">
            <h2 class="text-xl font-bold mb-6 italic">📅 Kalender Rencana (Hanya Kamu Yang Bisa Lihat)</h2>
            <div class="grid grid-cols-7 gap-2" id="cal"></div>
        </div>
        <div class="bg-blue-900 p-8 rounded-[2.5rem] text-white">
            <p class="font-bold mb-4">Set Reminder Email</p>
            <input type="date" class="w-full bg-blue-800 p-3 rounded-xl mb-3 border-none text-white">
            <textarea placeholder="Apa rencana besok?" class="w-full bg-blue-800 p-3 rounded-xl h-40 border-none text-white"></textarea>
            <button onclick="alert('Email Reminder Aktif!')" class="w-full bg-blue-500 p-4 rounded-xl font-bold mt-4">Aktifkan Reminder</button>
        </div>
    </div>
    <script>
        const cal = document.getElementById('cal');
        for(let i=1; i<=31; i++) {
            cal.innerHTML += `<div class="h-10 bg-gray-50 flex items-center justify-center rounded-lg hover:bg-blue-100 cursor-pointer">${i}</div>`;
        }
    </script>
</body>
