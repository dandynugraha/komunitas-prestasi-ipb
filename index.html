<!DOCTYPE html>
<html>
<head>
    <title>Komunitas Prestasi IPB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>Website Komunitas Prestasi IPB</h1>
    <p>Website sedang dikembangkan.</p>

    <script>
        // 2. Inisialisasi Koneksi
        const supabaseUrl = 'https://fofgkmqpvovbocjzjrfg.supabase.co'
        const supabaseKey = 'sb_publishable_zirL9ncK9SCs8zxXOFq1pQ_ZNPM5eJc'
        
        // Gunakan cara panggil yang benar untuk versi CDN
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

        async function testConnection() {
            console.log("Sedang mencoba menyambung...");
            
            const { data, error } = await supabaseClient
                .from("members")
                .select("*")

            if (error) {
                console.error("Error nih:", error.message)
            } else {
                console.log("Koneksi Berhasil! Data dari tabel members:", data)
            }
        }

        // 3. Jalankan fungsi
        testConnection()
    </script>
</body>
</html>
