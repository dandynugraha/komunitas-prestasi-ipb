<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Anggota - Aksara Karya</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex">

    <div class="w-64 bg-blue-900 h-screen shadow text-white hidden md:block">
        <h1 class="text-xl font-bold p-6 border-b border-blue-800 tracking-wider">AKSARAKARYA</h1>
        <ul class="p-4 space-y-3">
            <li class="bg-blue-800 p-3 rounded-lg cursor-pointer">Dashboard</li>
            <li class="p-3 hover:bg-blue-800 rounded-lg cursor-pointer opacity-70">My Plan</li>
            <li class="p-3 hover:bg-blue-800 rounded-lg cursor-pointer opacity-70">Leaderboard</li>
            <li><button onclick="logout()" class="text-red-400 p-3 mt-10 hover:text-red-300">Log Out</button></li>
        </ul>
    </div>

    <div class="flex-1 p-6 md:p-10 h-screen overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800" id="username">Memuat...</h2>
            <div class="bg-orange-100 text-orange-600 px-4 py-2 rounded-full font-bold text-sm">
                Poin: <span id="userPoints">0</span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
            <h3 class="font-bold text-lg mb-4 text-blue-900">Upload Prestasi Baru</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="pTitle" type="text" placeholder="Judul Prestasi (Juara 1 Lomba...)" class="border p-3 rounded-lg w-full outline-none focus:ring-2 focus:ring-blue-500">
                <select id="pCluster" class="border p-3 rounded-lg w-full outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Olimpiade">Olimpiade</option>
                    <option value="Bisnis">Bisnis</option>
                    <option value="Penulisan">Penulisan</option>
                    <option value="Desain">Desain</option>
                </select>
                <textarea id="pStory" placeholder="Ceritakan singkat pengalamanmu..." class="border p-3 rounded-lg w-full md:col-span-2 h-24 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <input id="pImage" type="text" placeholder="Link Foto (Imgur/Gdrive)" class="border p-3 rounded-lg w-full md:col-span-2 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="uploadPrestasi()" id="btnUpload" class="mt-4 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition w-full md:w-auto">
                Kirim Prestasi
            </button>
        </div>

        <div id="statusMsg" class="mb-4 hidden p-3 rounded-lg text-center font-medium"></div>
    </div>

    <script>
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co"
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I"
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey)

        const user = JSON.parse(localStorage.getItem("user"))
        if(!user) { window.location.href = "login.html" }

        document.getElementById("username").innerText = "Halo, " + user.name
        document.getElementById("userPoints").innerText = user.points || 0

        async function uploadPrestasi() {
            const title = document.getElementById("pTitle").value
            const cluster = document.getElementById("pCluster").value
            const story = document.getElementById("pStory").value
            const image = document.getElementById("pImage").value
            const btn = document.getElementById("btnUpload")
            const msg = document.getElementById("statusMsg")

            if(!title || !story) return alert("Isi judul dan cerita dulu ya!")

            btn.innerText = "Mengirim..."
            btn.disabled = true

            // Simpan ke tabel prestasi
            const { error } = await _supabase.from("prestasi").insert([
                { 
                    title: title, 
                    cluster: cluster, 
                    story: story, 
                    image: image,
                    member_name: user.name,
                    member_email: user.email
                }
            ])

            if(error) {
                msg.innerText = "Gagal upload: " + error.message
                msg.className = "bg-red-100 text-red-600 p-3 rounded-lg block"
            } else {
                msg.innerText = "Berhasil! Prestasimu sudah tayang di Leaderboard."
                msg.className = "bg-green-100 text-green-600 p-3 rounded-lg block"
                // Reset form
                document.getElementById("pTitle").value = ""
                document.getElementById("pStory").value = ""
            }
            btn.innerText = "Kirim Prestasi"
            btn.disabled = false
        }

        function logout() {
            localStorage.removeItem("user")
            window.location.href = "login.html"
        }
    </script>
</body>
</html>
