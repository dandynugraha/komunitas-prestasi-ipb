<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aksara Karya - Main Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#F8FAFC] flex min-h-screen font-sans">
    <aside class="w-80 bg-white border-r border-gray-100 flex flex-col fixed h-full z-50">
        <div class="p-8 flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-feather-pointed"></i></div>
            <h1 class="text-xl font-bold text-blue-900 tracking-tighter">AKSARA KARYA 62</h1>
        </div>
        <nav class="flex-1 px-6 space-y-3">
            <button onclick="loadPage('upload-prestasi.html')" class="w-full flex items-center p-4 rounded-2xl hover:bg-blue-50 text-gray-600 font-bold transition">
                <i class="fa-solid fa-trophy mr-4"></i> Upload Prestasi
            </button>
            <button onclick="loadPage('upload-proyek.html')" class="w-full flex items-center p-4 rounded-2xl hover:bg-purple-50 text-gray-600 font-bold transition">
                <i class="fa-solid fa-diagram-project mr-4"></i> Upload Proyek
            </button>
            <button onclick="loadPage('lomba-saya.html')" class="w-full flex items-center p-4 rounded-2xl hover:bg-orange-50 text-gray-600 font-bold transition">
                <i class="fa-solid fa-flag-checkered mr-4"></i> Lomba Saya
            </button>
            <button onclick="loadPage('my-plan.html')" class="w-full flex items-center p-4 rounded-2xl hover:bg-green-50 text-gray-600 font-bold transition">
                <i class="fa-solid fa-calendar-day mr-4"></i> My Plan
            </button>
        </nav>
        <div class="p-8 border-t"><button onclick="location.href='logout.html'" class="text-red-400 font-bold"><i class="fa-solid fa-power-off mr-2"></i> Keluar Akun</button></div>
    </aside>

    <main class="ml-80 flex-1 p-0 h-screen">
        <iframe id="content-frame" src="upload-prestasi.html" class="w-full h-full border-none"></iframe>
    </main>

    <script>
        function loadPage(url) {
            document.getElementById('content-frame').src = url;
        }
    </script>
</body>
</html>
