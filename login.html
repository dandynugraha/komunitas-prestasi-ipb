<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Anggota - Aksara Karya</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-96 border border-gray-100">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-900">
            Login Anggota
        </h1>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Email IPB</label>
                <input id="email" type="email" placeholder="contoh@email.com"
                    class="w-full border border-gray-200 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Kode Anggota</label>
                <input id="password" type="password" placeholder="••••••••"
                    class="w-full border border-gray-200 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <button id="loginBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-xl shadow-lg shadow-blue-200 transition duration-200 active:scale-95">
                Masuk ke Dashboard
            </button>
        </div>

        <p id="error" class="text-red-500 mt-4 text-center text-sm font-medium"></p>
    </div>

    <script>
        // Inisialisasi Supabase
        const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co"
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVheWd4bGZ3cnNiamZzam1mcHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzE4MDQsImV4cCI6MjA4OTUwNzgwNH0.f91OrgTEAj0kSfwXKKiKNRfz_487zN9mWKYNeDJu84I"
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

        document.getElementById("loginBtn").addEventListener("click", login)

        async function login() {
            const emailInput = document.getElementById("email").value.trim()
            const passwordInput = document.getElementById("password").value.trim()
            const errorMsg = document.getElementById("error")
            const btn = document.getElementById("loginBtn")

            // Reset status
            errorMsg.innerText = ""
            btn.innerText = "Mengecek..."
            btn.disabled = true

            try {
                // Mencari data di tabel members
                const { data, error } = await _supabase
                    .from("members")
                    .select("*")
                    .eq("email", emailInput)
                    .eq("password", passwordInput)

                console.log("Hasil Database:", data)

                // CEK: Apakah data ketemu dan tidak error?
                if (error) throw error;

                if (data && data.length > 0) {
                    // BERHASIL: Ambil data urutan pertama [0]
                    const userAccount = data[0]
                    
                    // Simpan ke localStorage
                    localStorage.setItem("user", JSON.stringify(userAccount))

                    // PINDAH HALAMAN
                    window.location.href = "dashboard.html"
                } else {
                    // GAGAL: Data kosong
                    errorMsg.innerText = "Email atau kode anggota salah!"
                    btn.innerText = "Masuk ke Dashboard"
                    btn.disabled = false
                }

            } catch (err) {
                console.error("System Error:", err)
                errorMsg.innerText = "Terjadi gangguan koneksi ke database."
                btn.innerText = "Masuk ke Dashboard"
                btn.disabled = false
            }
        }
    </script>

</body>
</html>
