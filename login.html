<!DOCTYPE html>

<html>
<head>

<title>Login Anggota</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

<h1 class="text-2xl font-bold mb-6 text-center">
Login Anggota
</h1>

<input id="email"
type="email"
placeholder="Email"
class="w-full border p-3 rounded mb-4">

<input id="password"
type="password"
placeholder="Kode Anggota"
class="w-full border p-3 rounded mb-4">

<button
onclick="login()"
class="w-full bg-blue-600 text-white p-3 rounded">

Login

</button>

<p id="error" class="text-red-500 mt-4 text-center"></p>

</div>

<script>

const supabaseUrl = "https://uaygxlfwrsbjfsjmfpum.supabase.co"
const supabaseKey = "ANON_KEY_KAMU"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase
.from("members")
.select("*")
.eq("email", email)
.eq("password", password)
.single()

if(error){

document.getElementById("error").innerText =
"Email atau kode anggota salah"

return

}

localStorage.setItem("user", JSON.stringify(data))

window.location.href = "dashboard.html"

}

</script>

</body>
</html>
