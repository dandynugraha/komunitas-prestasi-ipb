<script src="https://cdn.tailwindcss.com"></script>
<body class="p-10 bg-[#F8FAFC]">
    <div class="max-w-4xl bg-white p-10 rounded-[2.5rem] shadow-sm border border-purple-100">
        <h2 class="text-2xl font-black text-purple-900 mb-8">🚀 Buat Proyek Kolaborasi</h2>
        <div class="space-y-4">
            <input placeholder="Nama Proyek" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100">
            <textarea placeholder="Struktur Anggota (Nama - Role)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-gray-100"></textarea>
            
            <div id="timeline-box" class="p-6 bg-purple-50 rounded-3xl space-y-3">
                <p class="font-bold text-purple-700">Timeline & Milestone (Akan dibagi % otomatis)</p>
                <div id="list" class="space-y-2">
                    <input placeholder="Timeline 1" class="t-item w-full p-3 rounded-xl border-none">
                </div>
                <button onclick="addRow()" class="text-purple-600 font-bold text-sm">+ Tambah Timeline</button>
            </div>
        </div>
        <button onclick="calculate()" class="w-full mt-8 bg-purple-600 text-white p-5 rounded-2xl font-black shadow-lg">Simpan Proyek</button>
    </div>
    <script>
        function addRow() {
            const input = document.createElement('input');
            input.className = "t-item w-full p-3 rounded-xl border-none mt-2";
            input.placeholder = "Timeline selanjutnya...";
            document.getElementById('list').appendChild(input);
        }
        function calculate() {
            const total = document.querySelectorAll('.t-item').length;
            alert("Proyek disimpan! Setiap timeline bernilai " + (100/total).toFixed(1) + "%");
        }
    </script>
</body>
